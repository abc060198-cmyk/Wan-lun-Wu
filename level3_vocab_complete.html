<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大考中心字彙表 Level 3 完整版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Playfair+Display:wght@700&family=Source+Code+Pro&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1209;
    --paper: #faf6ee;
    --accent: #c0392b;
    --gold: #b5860d;
    --muted: #7a6a50;
    --card-bg: #fff9f0;
    --border: #d4c4a0;
    --tag-bg: #f0e8d0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    text-align: center;
    letter-spacing: .04em;
    margin-bottom: .3rem;
    color: var(--accent);
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: .9rem;
    margin-bottom: 1rem;
    letter-spacing: .1em;
  }
  .stats {
    text-align: center;
    font-size: .8rem;
    color: var(--border);
    margin-bottom: 1.8rem;
  }
  /* search */
  .search-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 1.2rem;
  }
  .search-wrap input {
    width: min(420px, 90vw);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: .5rem 1.2rem;
    font-family: 'Noto Serif TC', serif;
    font-size: .9rem;
    background: var(--card-bg);
    outline: none;
    color: var(--ink);
  }
  .search-wrap input:focus { border-color: var(--accent); }

  /* filter bar */
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: .5rem;
    justify-content: center;
    margin-bottom: 1.8rem;
  }
  .filter-bar button {
    background: var(--tag-bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: .3rem .9rem;
    font-family: 'Noto Serif TC', serif;
    font-size: .82rem;
    cursor: pointer;
    color: var(--muted);
    transition: all .2s;
  }
  .filter-bar button:hover,
  .filter-bar button.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* result count */
  .result-count {
    text-align: center;
    font-size: .8rem;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  /* grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* card */
  .card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.1rem .9rem;
    position: relative;
    transition: box-shadow .2s, transform .2s;
  }
  .card:hover {
    box-shadow: 0 5px 20px rgba(0,0,0,.09);
    transform: translateY(-2px);
  }
  .card-num {
    position: absolute;
    top: .65rem; right: .8rem;
    font-family: 'Source Code Pro', monospace;
    font-size: .68rem;
    color: var(--border);
  }
  .card-word {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    color: var(--accent);
    margin-bottom: .1rem;
    padding-right: 2rem;
  }
  .card-zhuyin {
    font-size: .75rem;
    color: var(--gold);
    letter-spacing: .1em;
    margin-bottom: .15rem;
  }
  .card-ipa {
    font-family: 'Source Code Pro', monospace;
    font-size: .72rem;
    color: var(--muted);
    margin-bottom: .4rem;
  }
  .card-pos {
    display: inline-block;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: .03rem .35rem;
    font-size: .68rem;
    color: var(--muted);
    margin-bottom: .4rem;
  }
  .card-meaning {
    font-size: .85rem;
    line-height: 1.65;
    color: var(--ink);
    margin-bottom: .5rem;
  }
  .speak-btn {
    display: inline-flex;
    align-items: center;
    gap: .25rem;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: .15rem .6rem;
    font-family: 'Noto Serif TC', serif;
    font-size: .7rem;
    color: var(--muted);
    cursor: pointer;
    transition: all .18s;
  }
  .speak-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .speak-btn.speaking {
    background: var(--accent); color: #fff; border-color: var(--accent);
    animation: pulse .6s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    from { opacity:1; transform:scale(1); }
    to   { opacity:.75; transform:scale(1.04); }
  }

  /* pagination */
  .pagination {
    display: flex;
    flex-wrap: wrap;
    gap: .4rem;
    justify-content: center;
    margin: 2rem auto 1rem;
    max-width: 900px;
  }
  .pagination button {
    background: var(--tag-bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: .3rem .7rem;
    font-size: .8rem;
    cursor: pointer;
    color: var(--muted);
    transition: all .15s;
    font-family: 'Noto Serif TC', serif;
  }
  .pagination button:hover,
  .pagination button.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .page-jump {
    display: flex;
    align-items: center;
    gap: .4rem;
    justify-content: center;
    margin-bottom: 1.5rem;
    font-size: .82rem;
    color: var(--muted);
  }
  .page-jump input {
    width: 60px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: .25rem .5rem;
    text-align: center;
    font-size: .82rem;
    outline: none;
  }
  .page-jump button {
    background: var(--tag-bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: .25rem .7rem;
    cursor: pointer;
    font-size: .8rem;
    color: var(--muted);
    transition: all .15s;
  }
  .page-jump button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  footer {
    text-align: center;
    margin-top: 2rem;
    color: var(--border);
    font-size: .75rem;
  }
</style>
</head>

// ── TTS ──────────────────────────────────────────
const synth = window.speechSynthesis;
let enVoice = null;
function loadVoices() {
  const v = synth.getVoices();
  enVoice = v.find(x => x.lang === 'en-US') || v.find(x => x.lang.startsWith('en')) || null;
}
loadVoices();
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

function speak(word, btn) {
  if (!synth) return;
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang = 'en-US'; utt.rate = 0.85;
  if (enVoice) utt.voice = enVoice;
  btn.classList.add('speaking');
  utt.onend = utt.onerror = () => {
    btn.classList.remove('speaking');
    btn.querySelector('.si').textContent = '🔈';
  };
  synth.speak(utt);
}

// ── Filter & Search ───────────────────────────────
const posMap = { n:'n', vt:'v', vi:'v', a:'a', adv:'adv', aux:'other', prep:'other', conj:'other' };
function getPosGroup(pos) {
  const key = pos.replace(/[.1-9]/g,'').toLowerCase();
  return posMap[key] || 'other';
}

let activeFilter = 'all';
let filtered = [...words];

document.querySelectorAll('.filter-bar button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    currentPage = 1;
    applyFilters();
  });
});

document.getElementById('searchInput').addEventListener('input', () => {
  currentPage = 1;
  applyFilters();
});

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  filtered = words.filter(w => {
    const matchPos = activeFilter === 'all' || getPosGroup(w.pos) === activeFilter;
    const matchQ = !q || w.word.toLowerCase().includes(q) || w.meaning.includes(q);
    return matchPos && matchQ;
  });
  document.getElementById('resultCount').textContent = `顯示 ${filtered.length.toLocaleString()} 個單字`;
  renderPage();
  renderPagination();
}

// ── Pagination ────────────────────────────────────
const PAGE_SIZE = 50;
let currentPage = 1;

function totalPages() { return Math.ceil(filtered.length / PAGE_SIZE); }

function renderPage() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);
  document.getElementById('grid').innerHTML = slice.map(cardHTML).join('');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderPagination() {
  const tp = totalPages();
  const pg = document.getElementById('pagination');
  if (tp <= 1) { pg.innerHTML = ''; return; }

  let btns = '';
  // prev
  btns += `<button onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ 上頁</button>`;
  // page numbers (show window of 7)
  const delta = 3;
  let lo = Math.max(1, currentPage - delta);
  let hi = Math.min(tp, currentPage + delta);
  if (lo > 1) btns += `<button onclick="goPage(1)">1</button>${lo>2?'<span style="padding:0 .3rem;color:var(--border)">…</span>':''}`;
  for (let i = lo; i <= hi; i++) {
    btns += `<button class="${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  if (hi < tp) btns += `${hi<tp-1?'<span style="padding:0 .3rem;color:var(--border)">…</span>':''}<button onclick="goPage(${tp})">${tp}</button>`;
  // next
  btns += `<button onclick="goPage(${currentPage+1})" ${currentPage===tp?'disabled':''}>下頁 ›</button>`;
  pg.innerHTML = btns;

  document.getElementById('pageInput').value = currentPage;
  document.getElementById('pageInput').max = tp;
}

function goPage(p) {
  const tp = totalPages();
  if (p < 1 || p > tp) return;
  currentPage = p;
  renderPage();
  renderPagination();
}

function jumpToPage() {
  const val = parseInt(document.getElementById('pageInput').value);
  goPage(val);
}

// ── Card HTML ─────────────────────────────────────
function cardHTML(w) {
  const safe = w.word.replace(/'/g, "\\'");
  return `<div class="card">
    <span class="card-num">#${w.num}</span>
    <div class="card-word">${w.word}</div>
    <div class="card-zhuyin">${w.zhuyin}</div>
    <div class="card-ipa">${w.ipa}</div>
    <span class="card-pos">${w.pos}</span>
    <div class="card-meaning">${w.meaning}</div>
    <button class="speak-btn" onclick="speak('${safe}', this)">
      <span class="si">🔈</span> 發音
    </button>
  </div>`;
}

// ── Init ──────────────────────────────────────────
applyFilters();
</script>
